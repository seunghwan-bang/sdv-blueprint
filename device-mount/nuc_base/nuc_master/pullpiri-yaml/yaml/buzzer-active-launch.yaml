apiVersion: v1
kind: Scenario
metadata:
  name: buzzer-active
spec:
  condition: null
  action: launch
  target: buzzer-active
---
apiVersion: v1
kind: Package
metadata:
  label: null
  name: buzzer-active
spec:
  pattern:
    - type: plain
  models:
    - name: buzzer-active
      node: guest
      resources:
        volume:
        network:
---
apiVersion: v1
kind: Model
metadata:
  name: buzzer-active
  annotations:
    io.piccolo.annotations.package-type: ba
    io.piccolo.annotations.package-name: ba
    io.piccolo.annotations.package-network: default
  labels:
    app: ba
spec:
  containers:
    - name: buzzer-active
      image: localhost/kuksa-serial-bridge:latest
      env:
      - name: MASTER_IP
        value: "192.168.1.2"
      securityContext:
        privileged: true
      volumeMounts:
        - name: arduino
          mountPath: /dev/arduino_buzzer
  volumes:
    - name: arduino
      hostPath:
        path: /dev/arduino_active
  terminationGracePeriodSeconds: 0
  restartPolicy: Always

