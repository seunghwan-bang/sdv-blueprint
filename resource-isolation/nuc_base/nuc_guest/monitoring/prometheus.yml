global:
  scrape_interval: 100ms      # finer sampling for ON/OFF tick visualization
  evaluation_interval: 100ms

scrape_configs:
  - job_name: 'led-timpani'
    static_configs:
      - targets: ['localhost:9101']  # ← guest PC IP:9101
        labels:
          container: 'timpani'
          type: 'realtime'

  - job_name: 'led-normal'
    static_configs:
      - targets: ['localhost:9102']  # ← guest PC IP:9102
        labels:
          container: 'normal'
          type: 'standard'

# example (guest PC IP 192.168.0.2)
#   - targets: ['192.168.0.2:9101']
#   - targets: ['192.168.0.2:9102']
# or env/docker compose override
