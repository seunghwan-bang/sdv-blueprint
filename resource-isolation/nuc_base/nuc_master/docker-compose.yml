services:
  photo-resistor:
    build:
      context: ./serial
    container_name: photo-resistor
    #network_mode: "host"
    devices:
      #- "/dev/arduino_light:/dev/arduino_light"
      - "/dev/arduino_block:/dev/arduino_block"
    volumes:
      - ./serial:/app
    working_dir: /app
    command: python3 bridge.py
    environment:
      PYTHONUNBUFFERED: "1"
      #MASTER_IP: "192.168.1.2"